name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Build JAR file (если используете Maven)
        run: |
          if [ -f "pom.xml" ]; then
            mvn clean package -DskipTests
          fi

      - name: Copy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Создаем директорию
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "mkdir -p /opt/my-service"
          
          # Копируем docker-compose.yml
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            "$VPS_USER@$VPS_HOST:/opt/my-service/"
          
          # Копируем Dockerfile (если есть)
          if [ -f "Dockerfile" ]; then
            sshpass -p "$VPS_PASSWORD" scp \
              -o StrictHostKeyChecking=no \
              Dockerfile \
              "$VPS_USER@$VPS_HOST:/opt/my-service/"
          fi
          
          # Копируем JAR файл (если есть)
          if [ -f "target/*.jar" ]; then
            sshpass -p "$VPS_PASSWORD" scp \
              -o StrictHostKeyChecking=no \
              target/*.jar \
              "$VPS_USER@$VPS_HOST:/opt/my-service/app.jar"
          fi

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" '
              cd /opt/my-service &&
              # Если есть Dockerfile, собираем образ
              if [ -f "Dockerfile" ]; then
                docker compose build api
              fi
              docker compose up -d --remove-orphans
            '

      - name: Wait for API to start
        run: sleep 15

      - name: Test Java API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔍 Проверка API на http://$VPS_HOST:8080"
          
          RETRY=0
          MAX_RETRIES=20
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              http://$VPS_HOST:8080/actuator/health 2>/dev/null || echo "000")
          
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Java API работает! HTTP Status: $HTTP_CODE"
              curl -s http://$VPS_HOST:8080/actuator/health
              break
            else
              RETRY=$((RETRY + 1))
              echo "⏳ Ожидание... (${RETRY}/${MAX_RETRIES}) HTTP: $HTTP_CODE"
              sleep 3
            fi
          done
          
          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ API не запустился!"
            exit 1
          fi

      - name: Show containers status
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" '
              cd /opt/my-service &&
              docker compose ps
            '

      - name: Deployment complete
        run: |
          echo "========================================="
          echo "✅ Деплой на 135.106.162.132 завершен!"
          echo "🌐 API: http://135.106.162.132:8080"
          echo "========================================="