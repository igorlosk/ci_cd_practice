name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    timeout-minutes: 15


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify JAR exists
        run: |
          if [ ! -f target/*.jar ]; then
            echo "❌ JAR файл не найден!"
            exit 1
          fi
          echo "✅ JAR файл создан:"
          ls -la target/*.jar

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "📁 Подготовка директории на VPS..."
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              mkdir -p /opt/my-service &&
              chmod 755 /opt/my-service
            "
          
          echo "📤 Копирование файлов..."
          # Копируем docker-compose.yml
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            "$VPS_USER@$VPS_HOST:/opt/my-service/docker-compose.yml"
          
          # Копируем JAR файл
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            target/*.jar \
            "$VPS_USER@$VPS_HOST:/opt/my-service/app.jar"
          
          echo "📂 Файлы на VPS:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "ls -la /opt/my-service/"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🚀 Запускаем деплой..."
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              echo '📦 Остановка старых контейнеров...' &&
              docker compose down || true &&
              echo '🔄 Пересборка...' &&
              docker compose up -d --build &&
              echo '✅ Контейнеры запущены'
              docker compose ps
            "

      - name: Wait for services to start
        run: |
          echo "⏳ Ожидаем запуска сервисов..."
          sleep 10

      - name: Check container status
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🐳 Статус контейнеров:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              docker compose ps
            "

      - name: Check API logs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        if: always() # Показывать логи даже при ошибке
        run: |
          echo "📝 Логи API (последние 50 строк):"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              docker compose logs api --tail=50 --since=2m
            "

      - name: Test API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔍 Проверка API на http://$VPS_HOST:8080"
          
          RETRY=0
          MAX_RETRIES=30
          SLEEP_TIME=5
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            # Проверяем основной эндпоинт
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://$VPS_HOST:8080/" 2>/dev/null || echo "000")
          
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "✅ API отвечает! HTTP Status: $HTTP_CODE"
              echo "📊 Ответ API:"
              curl -s "http://$VPS_HOST:8080/"
              echo ""
          
              # Пробуем проверить health если есть
              HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                "http://$VPS_HOST:8080/actuator/health" 2>/dev/null || echo "000")
              if [ "$HEALTH_CODE" = "200" ]; then
                echo "✅ Health check: OK"
                curl -s "http://$VPS_HOST:8080/actuator/health"
                echo ""
              fi
          
              break
            else
              RETRY=$((RETRY + 1))
              echo "⏳ Ожидание... (${RETRY}/${MAX_RETRIES}) HTTP: $HTTP_CODE"
          
              # Каждые 5 попыток показываем логи
              if [ $((RETRY % 5)) -eq 0 ]; then
                echo "📝 Последние логи:"
                sshpass -p "$VPS_PASSWORD" ssh \
                  -o StrictHostKeyChecking=no \
                  "$VPS_USER@$VPS_HOST" "
                    cd /opt/my-service &&
                    docker compose logs api --tail=10 2>/dev/null || true
                  "
              fi
          
              sleep $SLEEP_TIME
            fi
          done
          
          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ API не запустился за отведенное время!"
            echo ""
            echo "🔧 Для диагностики выполните:"
            echo "   ssh $VPS_USER@$VPS_HOST"
            echo "   cd /opt/my-service"
            echo "   docker compose logs api --tail=100"
            echo "   docker compose logs postgres --tail=50"
            exit 1
          fi

      - name: Deployment complete
        if: success()
        run: |
          echo "========================================="
          echo "✅ Деплой успешно завершен!"
          echo "🌐 API доступен по адресу:"
          echo "   http://135.106.162.132:8080"
          echo "========================================="
          echo ""
          echo "📋 Полезные команды для VPS:"
          echo "   ssh $VPS_USER@$VPS_HOST"
          echo "   cd /opt/my-service"
          echo "   docker compose logs -f api  # Логи в реальном времени"
          echo "   docker compose ps           # Статус контейнеров"
          echo "   docker compose restart api  # Перезапуск API"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Деплой завершился с ошибкой!"
          echo ""
          echo "🔍 Проверьте:"
          echo "   1. Правильно ли настроены GitHub Secrets"
          echo "   2. Доступность VPS сервера"
          echo "   3. Логи в шаге 'Check API logs'"
          echo "   4. Свободное место на диске:"
          echo "      ssh $VPS_USER@$VPS_HOST 'df -h /opt'"