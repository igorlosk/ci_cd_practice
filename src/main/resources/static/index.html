<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Phone Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">📱 Phone Manager</h2>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="phonesTable"></tbody>
    </table>

    <hr>

    <input type="hidden" id="phoneId">

    <div class="mb-3">
        <label class="form-label">Brand</label>
        <input class="form-control" id="brand">
    </div>

    <div class="mb-3">
        <label class="form-label">Model</label>
        <input class="form-control" id="model">
    </div>

    <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" id="price" type="number">
    </div>

    <button class="btn btn-primary" onclick="savePhone()">
        Save
    </button>

    <button class="btn btn-secondary" onclick="clearForm()">
        Clear
    </button>

</div>

<script src="app.js"></script>

</body>
</html>
