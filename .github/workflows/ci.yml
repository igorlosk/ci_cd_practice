name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Создаем директорию
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "mkdir -p /opt/my-service"
          
          # Копируем файлы
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            "$VPS_USER@$VPS_HOST:/opt/my-service/"
          
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            target/*.jar \
            "$VPS_USER@$VPS_HOST:/opt/my-service/app.jar"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "cd /opt/my-service && docker compose down api 2>/dev/null || true && docker compose up -d"

      - name: Wait for API
        run: |
          echo "⏳ Ожидаем запуска API (30 секунд)..."
          sleep 30

      - name: Check container status
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🐳 Статус контейнеров:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "cd /opt/my-service && docker compose ps"

      - name: Check API logs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "📝 Логи API:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "cd /opt/my-service && docker compose logs api --tail=30"

      - name: Test API locally on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🔍 Проверка API локально на VPS:"
          RESPONSE=$(sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "curl -s http://localhost:8080/actuator/health 2>/dev/null || echo 'API не отвечает'")
          
          echo "Ответ: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "UP"; then
            echo "✅ API работает!"
          else
            echo "⚠️ API не отвечает или нездоров"
          fi

      - name: Test API from external
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔍 Проверка API извне:"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://$VPS_HOST:8080/actuator/health" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ API доступен извне! HTTP: $HTTP_CODE"
          else
            echo "⚠️ API не доступен извне. HTTP: $HTTP_CODE"
            echo "Возможные причины:"
            echo "  - Порт 8080 не открыт в брандмауэре"
            echo "  - Проброс порта не настроен"
            echo "  - API слушает на другом порту"
          fi

      - name: Deployment info
        run: |
          echo "========================================="
          echo "✅ Деплой завершен!"
          echo "📝 Проверьте API вручную:"
          echo "   curl http://135.106.162.132:8080/actuator/health"
          echo "========================================="