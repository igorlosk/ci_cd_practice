name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Создаем директорию
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "mkdir -p /opt/my-service"
          
          # Копируем docker-compose.yml
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            "$VPS_USER@$VPS_HOST:/opt/my-service/"
          
          # Копируем JAR файл
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            target/*.jar \
            "$VPS_USER@$VPS_HOST:/opt/my-service/app.jar"
          
          # Проверяем, что файлы скопировались
          echo "📂 Файлы на VPS:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "ls -la /opt/my-service/"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🚀 Запускаем деплой..."
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              docker compose down api 2>/dev/null || true &&
              docker compose up -d
            "

      - name: Wait for API to start
        run: |
          echo "⏳ Ожидаем запуска API..."
          sleep 30

      - name: Check container status
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "🐳 Статус контейнеров:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              docker compose ps
            "

      - name: Check API logs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "📝 Логи API:"
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
              cd /opt/my-service &&
              docker compose logs api --tail=30
            "

      - name: Test API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔍 Проверка API на http://$VPS_HOST:8080"
          
          RETRY=0
          MAX_RETRIES=20
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://$VPS_HOST:8080/actuator/health" 2>/dev/null || echo "000")
          
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "✅ API работает! HTTP Status: $HTTP_CODE"
              echo "📊 Health details:"
              curl -s "http://$VPS_HOST:8080/actuator/health"
              break
            else
              RETRY=$((RETRY + 1))
              echo "⏳ Ожидание... (${RETRY}/${MAX_RETRIES}) HTTP: $HTTP_CODE"
              sleep 3
            fi
          done
          
          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ API не запустился за отведенное время!"
            echo ""
            echo "📝 Проверьте логи на VPS вручную:"
            echo "   ssh $VPS_USER@$VPS_HOST"
            echo "   cd /opt/my-service"
            echo "   docker compose logs api --tail=50"
            exit 1
          fi

      - name: Deployment complete
        run: |
          echo "========================================="
          echo "✅ Деплой успешно завершен!"
          echo "🌐 API доступен по адресу:"
          echo "   http://135.106.162.132:8080/deploy"
          echo "========================================="